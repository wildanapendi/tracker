server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root        /var/www/html/public;
    index       index.php;

    # ---- Charset & Timeouts ------------------------------------------------
    charset utf-8;
    client_max_body_size 22M;
    keepalive_timeout 65;

    # ---- Laravel Health Check endpoint -------------------------------------
    location = /up {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ---- Primary Laravel Router --------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ---- PHP-FPM -----------------------------------------------------------
    location ~ \.php$ {
        fastcgi_pass   unix:/var/run/php-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        fastcgi_read_timeout    60;
        fastcgi_buffer_size     16k;
        fastcgi_buffers         4 16k;
    }

    # ---- Static Asset Caching ----------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires    30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ---- Security Headers --------------------------------------------------
    add_header X-Frame-Options          "SAMEORIGIN"  always;
    add_header X-Content-Type-Options   "nosniff"     always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ---- Deny hidden files -------------------------------------------------
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ---- Disable access to sensitive files ---------------------------------
    location ~* \.(env|log|lock|json|yaml|yml)$ {
        deny all;
    }
}
